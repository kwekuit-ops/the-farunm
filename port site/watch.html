<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE FARNUM | Watch</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://js.paystack.co/v1/inline.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <header>
        <div class="header-left">
            <i data-lucide="menu" id="menu-toggle-btn" style="cursor: pointer;"></i>
                <h1 class="header-logo">THE FARNUM <span>SYSTEMS</span></h1>
        </div>
        <div class="header-center">
            <div class="search-bar">
                <input type="text" placeholder="Search systems...">
            </div>
            <button class="search-btn">
                <i data-lucide="search" style="width: 18px;"></i>
            </button>
        </div>
        <div class="header-right">
            <i data-lucide="video" style="cursor: pointer;"></i>
            <i data-lucide="bell" style="cursor: pointer;" class="desktop-only"></i>

            <div id="user-profile" style="display: none; align-items: center; gap: 0.8rem; cursor: pointer;">
                <span id="user-name" style="font-size: 0.8rem; font-weight: 500;" class="desktop-only"></span>
                <div id="user-avatar" class="channel-avatar" style="width: 32px; height: 32px; border: 1px solid var(--accent-color);"></div>
            </div>
        </div>
    </header>

    <div class="app-layout">
        <aside class="sidebar">
            <a href="index.html" class="nav-item"><i data-lucide="home"></i> Home</a>
            <a href="#" class="nav-item"><i data-lucide="play-square"></i> Shorts</a>
            <a href="#" class="nav-item"><i data-lucide="library"></i> Subscriptions</a>
            <hr style="border: none; border-top: 1px solid #333; margin: 0.8rem 0;">
            <div style="padding: 0.5rem 0.8rem; font-size: 0.9rem; font-weight: 500;">Recent Modules</div>
            <div id="sidebar-recents"></div>
        </aside>

        <main class="main-content" style="padding: 2rem 5%; max-width: 1300px;">
            <div class="watch-layout" style="grid-template-columns: 1fr; gap: 1.5rem;">
                <div class="video-side">
                    <div class="player-container" id="player-container" style="border-radius: 12px; position: relative;">
                        <video id="main-video" autoplay controls style="aspect-ratio: 16/9; width: 100%; border-radius: 12px;"></video>
                        
                        <!-- Paystack Secure Paywall -->
                        <div id="paywall-overlay" style="display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(6,6,10,0.95); z-index: 10; border-radius: 12px; flex-direction: column; align-items: center; justify-content: center; backdrop-filter: blur(5px);">
                            <i data-lucide="lock" style="width: 48px; height: 48px; color: var(--accent-secondary); margin-bottom: 1rem;"></i>
                            <h2 style="font-size: 1.5rem; letter-spacing: 0.1em; margin-bottom: 0.5rem; font-family: 'Syne', sans-serif;">RESTRICTED MODULE</h2>
                            <p style="color: var(--text-secondary); margin-bottom: 2rem; font-size: 0.9rem;">Purchase required to unlock this premium training session.</p>
                            <button id="pay-unlock-btn" class="btn btn-primary" style="background: var(--accent-secondary); border-color: var(--accent-secondary); height: 50px; font-size: 1.1rem; padding: 0 2.5rem; border-radius: 6px;">
                                UNLOCK FOR $<span id="paywall-price">0.00</span>
                            </button>
                            <img src="https://upload.wikimedia.org/wikipedia/commons/1/18/Paystack_Logo.png" style="height: 18px; margin-top: 1.5rem; opacity: 0.5;" alt="Secured by Paystack">
                        </div>
                    </div>
                    
                    <div style="margin-top: 1rem;">
                        <h2 id="video-title" style="font-size: 1.25rem; font-weight: 600; margin-bottom: 0.8rem; font-family: 'Inter', sans-serif; text-transform: none; font-style: normal;">Loading Module...</h2>
                        
                        <div style="display: flex; justify-content: space-between; align-items: start; flex-wrap: wrap; gap: 1rem;">
                            <div style="display: flex; align-items: center; gap: 0.8rem;">
                                <div class="channel-avatar" style="width: 40px; height: 40px;"></div>
                                <div>
                                    <div style="font-weight: 600; font-size: 1rem;">The Farnum Elite</div>
                                    <div style="color: var(--text-secondary); font-size: 0.8rem;">Official Enterprise</div>
                                </div>
                                <button style="background: #fff; color: #000; border: none; padding: 0.5rem 1rem; border-radius: 20px; font-weight: 600; margin-left: 1rem; cursor: pointer;">Subscribe</button>
                            </div>
                            
                            <div style="display: flex; gap: 0.5rem;">
                                <div style="background: #272727; padding: 0.5rem 1rem; border-radius: 20px; display: flex; align-items: center; gap: 0.5rem; font-size: 0.9rem; font-weight: 500; cursor: pointer;">
                                    <i data-lucide="thumbs-up" style="width: 18px;"></i> 1.2K
                                </div>
                                <div style="background: #272727; padding: 0.5rem 1rem; border-radius: 20px; display: flex; align-items: center; gap: 0.5rem; font-size: 0.9rem; font-weight: 500; cursor: pointer;">
                                    <i data-lucide="share-2" style="width: 18px;"></i> Share
                                </div>
                            </div>
                        </div>

                        <div id="desc-box" style="background: #272727; border-radius: 12px; padding: 1rem; margin-top: 1rem; font-size: 0.9rem;">
                            <div style="font-weight: 600; margin-bottom: 0.5rem;">12K views • 2 days ago</div>
                            <p id="video-meta" style="color: #eee; line-height: 1.5;"></p>
                        </div>
                    </div>
                </div>

                <div class="cta-side" style="margin-top: 2rem; border-top: 1px solid #333; padding-top: 2rem;">
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 2rem;">
                        <a href="#" id="gaming-cta-btn" class="gaming-cta" style="width: 100%; border-radius: 8px;">
                            ACTIVATE GAMING SYSTEM ACCOUNT
                        </a>
                        <a href="https://t.me/your_group_link" class="btn btn-secondary" id="tg-return-btn-watch" style="width: 100%; justify-content: center; border-radius: 8px;">
                            <i data-lucide="send"></i> COMMUNITY HUB
                        </a>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="app.js"></script>
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
